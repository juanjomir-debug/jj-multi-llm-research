name: iOS Build & TestFlight

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.0.0)'
        required: false
        default: 'manual'

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor dependencies in reliableai
        working-directory: reliableai
        run: |
          echo "=== Installing Capacitor locally in reliableai/ ==="
          npm install --save-exact @capacitor/cli@6.2.0 @capacitor/core@6.2.0 @capacitor/ios@6.2.0 @capacitor/splash-screen@6.0.2 @capacitor/assets@3.0.5
          echo "=== Verifying installation ==="
          ls -la node_modules/@capacitor/ 2>/dev/null || echo "No @capacitor packages found!"
          echo "=== Installation complete ==="

      - name: Initialize Capacitor iOS (if ios/ dir missing)
        working-directory: reliableai
        run: |
          echo "=== Checking for ios directory ==="
          if [ ! -d "ios" ]; then
            echo "ios/ not found, initializing..."
            echo "Current directory: $(pwd)"
            echo "Capacitor config:"
            cat capacitor.config.json
            echo "Running: npx cap add ios"
            npx cap add ios
          else
            echo "ios/ directory already exists, skipping initialization"
          fi
          echo "=== iOS directory check complete ==="
          ls -la ios/ 2>/dev/null || echo "ERROR: Still no ios/ directory!"

      - name: Sync Capacitor
        working-directory: reliableai
        run: |
          echo "=== Syncing Capacitor ==="
          npx cap sync ios
          echo "=== Sync complete ==="
          echo "Checking ios/App structure:"
          ls -la ios/App/ 2>/dev/null || echo "ERROR: No ios/App/ directory!"

      - name: Generate app icons and splash
        working-directory: reliableai
        run: |
          echo "=== Generating app assets ==="
          if [ -f "ios-assets/icon-1024.png" ]; then
            echo "Found icon-1024.png, generating assets..."
            npx @capacitor/assets generate --ios || echo "WARNING: Asset generation failed, continuing anyway..."
          else
            echo "WARNING: No ios-assets/icon-1024.png found, skipping asset generation"
          fi
          echo "=== Asset generation complete ==="

      - name: Setup Ruby and Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false
          working-directory: reliableai/fastlane

      - name: Install Fastlane
        working-directory: reliableai/fastlane
        run: |
          bundle install

      - name: Import Distribution Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode and verify p12 before importing
          echo "$CERTIFICATE_BASE64" | base64 -D -o certificate.p12
          echo "P12 size: $(wc -c < certificate.p12) bytes"
          echo "P12 file type: $(file certificate.p12)"
          openssl pkcs12 -in certificate.p12 -noout -passin pass:"$CERTIFICATE_PASSWORD" && echo "P12 password OK" || echo "P12 password FAILED"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Import Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            -o ~/Library/MobileDevice/Provisioning\ Profiles/ReliableAI.mobileprovision

      - name: Debug - List iOS directory structure
        run: |
          echo "=== reliableai/ios structure ==="
          ls -la reliableai/ios/ 2>/dev/null || echo "reliableai/ios NOT FOUND"
          ls -la reliableai/ios/App/ 2>/dev/null || echo "reliableai/ios/App NOT FOUND"
          find reliableai/ios -name "*.xcodeproj" 2>/dev/null || echo "No .xcodeproj found"
          echo "=== PWD ==="
          pwd

      - name: Configure Team ID in Xcode project
        working-directory: reliableai/ios/App
        run: |
          echo "=== Configuring Team ID ==="
          # Set DEVELOPMENT_TEAM in project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = C59QGKA8BH;/g' App.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = ;/DEVELOPMENT_TEAM = C59QGKA8BH;/g' App.xcodeproj/project.pbxproj
          echo "=== Team ID configured ==="
          grep -n "DEVELOPMENT_TEAM" App.xcodeproj/project.pbxproj | head -5 || echo "No DEVELOPMENT_TEAM found yet"

      - name: Build & Upload to TestFlight
        working-directory: reliableai
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.ASC_PRIVATE_KEY_BASE64 }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          echo "=== Starting Fastlane build ==="
          echo "Working directory: $(pwd)"
          echo "Directory contents:"
          ls -la
          echo "iOS project check:"
          ls -la ios/App/ 2>/dev/null || echo "No ios/App/ found"
          echo "Running: bundle exec fastlane ios deploy"
          cd fastlane && bundle exec fastlane ios deploy

      - name: Upload IPA artifact (for manual inspection)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ReliableAI.ipa
          path: 'reliableai/*.ipa'
          retention-days: 7
