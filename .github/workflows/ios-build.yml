name: iOS Build & TestFlight

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.0.0)'
        required: false
        default: 'manual'

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor dependencies in reliableai
        working-directory: reliableai
        run: |
          npm install --save-exact @capacitor/cli@6.2.0 @capacitor/core@6.2.0 @capacitor/ios@6.2.0 @capacitor/splash-screen@6.0.2 @capacitor/assets@3.0.5

      - name: Initialize Capacitor iOS (if ios/ dir missing)
        working-directory: reliableai
        run: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          ls -la ios/ 2>/dev/null || echo "ERROR: Still no ios/ directory!"

      - name: Sync Capacitor
        working-directory: reliableai
        run: |
          npx cap sync ios
          ls -la ios/App/ 2>/dev/null || echo "ERROR: No ios/App/ directory!"

      - name: Generate app icons and splash
        working-directory: reliableai
        run: |
          if [ -f "ios-assets/icon-1024.png" ]; then
            npx @capacitor/assets generate --ios || echo "WARNING: Asset generation failed, continuing anyway..."
          fi

      - name: Setup Ruby and Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false
          working-directory: reliableai/fastlane

      - name: Install Fastlane
        working-directory: reliableai/fastlane
        run: bundle install

      - name: Import Distribution Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 -D -o certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Import Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            -o ~/Library/MobileDevice/Provisioning\ Profiles/ReliableAI.mobileprovision

      - name: Configure Xcode project
        working-directory: reliableai/ios/App
        run: |
          # Set Team ID
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = C59QGKA8BH;/g' App.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = ;/DEVELOPMENT_TEAM = C59QGKA8BH;/g' App.xcodeproj/project.pbxproj
          # Declare no non-exempt encryption (avoids App Store export compliance warning)
          plutil -replace ITSAppUsesNonExemptEncryption -bool NO App/Info.plist || \
          plutil -insert ITSAppUsesNonExemptEncryption -bool NO App/Info.plist
          echo "Info.plist encryption key:"
          grep -A1 "ITSAppUsesNonExemptEncryption" App/Info.plist

      - name: Build & Upload to TestFlight
        working-directory: reliableai
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.ASC_PRIVATE_KEY_BASE64 }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: cd fastlane && bundle exec fastlane ios deploy

      - name: Upload IPA artifact (for manual inspection)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ReliableAI.ipa
          path: 'reliableai/*.ipa'
          retention-days: 7
